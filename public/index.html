<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ECO - Kişisel Ekonomi Takip Uygulaması. Gelir, gider, borç ve tasarruf yönetimi.">
  <title>ECO — Ekonomi Takip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app" id="app">
    <!-- Sidebar Navigation -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">💎</span>
          <span class="logo-text">ECO</span>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Menüyü aç/kapat">
          <span></span><span></span><span></span>
        </button>
      </div>
      <ul class="nav-list" id="navList"></ul>
      <div class="sidebar-footer">
        <div class="current-date" id="currentDate"></div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
      <header class="top-bar">
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menü">
          <span></span><span></span><span></span>
        </button>
        <h1 class="page-title" id="pageTitle">Dashboard</h1>
        <div class="top-bar-actions">
          <button class="btn btn-ghost" id="themeToggle" aria-label="Tema Değiştir" style="font-size:1.2rem;padding:4px 8px">☀️</button>
          <div class="month-selector">
            <button class="btn btn-ghost" id="prevMonth" aria-label="Önceki Ay">‹</button>
            <span id="currentMonth" class="month-label"></span>
            <button class="btn btn-ghost" id="nextMonth" aria-label="Sonraki Ay">›</button>
          </div>
        </div>
      </header>
      <div class="content-area" id="contentArea">
        <!-- Dynamic content loaded here -->
      </div>
    </main>
  </div>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle"></h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toastContainer"></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
